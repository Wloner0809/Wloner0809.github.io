name: Update Google Scholar Data

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        cd google_scholar_crawler
        pip install -r requirements.txt
        
    - name: Run scholar crawler with timeout
      timeout-minutes: 10
      env:
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
      run: |
        cd google_scholar_crawler
        python main.py
        
    - name: Check if data was updated
      run: |
        if [ -f google_scholar_crawler/results/gs_data.json ]; then
          echo "Scholar data updated successfully"
          ls -la google_scholar_crawler/results/
        else
          echo "Failed to update scholar data"
          exit 1
        fi
        
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add google_scholar_crawler/results/
        git diff --staged --quiet || git commit -m "Update Google Scholar data $(date)"
        git push